<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamStore | Login</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖥️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="theme.css">
</head>
<body>

<!-- COPA DO MUNDO BANNER -->
<div class="copa-banner">
    <span>⚽</span>
    <span class="copa-text">Copa do Mundo 2026 — Vai, Brasil! 🇧🇷🟡🟢</span>
    <span>⚽</span>
</div>

<!-- Bolas flutuantes Copa -->
<div class="copa-ball b1">⚽</div>
<div class="copa-ball b2">⚽</div>
<div class="copa-ball b3">⚽</div>

<div class="background-glow"></div>

<div class="login-box">
    <div class="tabs">
        <div class="tab active" id="loginTab" onclick="showLogin()">ENTRAR</div>
        <div class="tab" id="registerTab" onclick="showRegister()">REGISTRAR</div>
    </div>

    <div id="loginArea" class="form-container">
        <h1>BEM-VINDO</h1>
        <p class="subtitle">Sentimos sua falta! Entre na sua conta.</p>
        <form onsubmit="login(); return false;" autocomplete="on">
            <div class="input-group">
                <input type="email" id="email" placeholder=" " required autocomplete="email">
                <label>Email</label>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder=" " required autocomplete="current-password">
                <label>Senha</label>
            </div>
            <button type="submit" class="btn login-btn">ENTRAR</button>
        </form>
    </div>

    <div id="registerArea" class="form-container" style="display:none;">
        <h1>CRIAR CONTA</h1>
        <p class="subtitle">Junte-se a nós e comece sua jornada.</p>
        <form onsubmit="register(); return false;" autocomplete="on">
            <div class="input-group">
                <input type="text" id="registerName" placeholder=" " required autocomplete="name">
                <label>Seu nome</label>
            </div>
            <div class="input-group">
                <input type="email" id="registerEmail" placeholder=" " required autocomplete="email">
                <label>Novo email</label>
            </div>
            <div class="input-group">
                <input type="password" id="registerPassword" placeholder=" " required autocomplete="new-password">
                <label>Nova senha</label>
            </div>
            <button type="submit" class="btn register-btn">CRIAR CONTA</button>
        </form>
    </div>

    <p id="msg"></p>
</div>

<script src="notifications.js"></script>
<script src="script.js"></script>
<script src="theme-switcher.js"></script>
</body>
</html>
